name: 自动同步岗位数据
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 从 Lark Base 同步岗位数据
        env:
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          BASE_TOKEN: ${{ secrets.BASE_TOKEN }}
          TABLE_ID: ${{ secrets.TABLE_ID }}
        run: |
          # 1. 获取 tenant_access_token
          TOKEN_RESP=$(curl -s -X POST 'https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal' \
            -H 'Content-Type: application/json' \
            -d "{\"app_id\":\"${LARK_APP_ID}\",\"app_secret\":\"${LARK_APP_SECRET}\"}")
          echo "Token response: $(echo $TOKEN_RESP | jq '.code')"
          TOKEN=$(echo "$TOKEN_RESP" | jq -r '.tenant_access_token')

          # 2. 获取字段信息（用于字段名映射）
          FIELDS_RESP=$(curl -s -X GET "https://open.feishu.cn/open-apis/bitable/v1/apps/${BASE_TOKEN}/tables/${TABLE_ID}/fields" \
            -H "Authorization: Bearer $TOKEN")
          echo "Fields: $(echo $FIELDS_RESP | jq '[.data.items[] | {name: .field_name}]')"

          # 3. 搜索所有记录
          RECORDS_RESP=$(curl -s -X POST "https://open.feishu.cn/open-apis/bitable/v1/apps/${BASE_TOKEN}/tables/${TABLE_ID}/records/search?page_size=500" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{}')

          # 4. 转换为 jobs.json 格式
          echo "$RECORDS_RESP" | jq '[.data.items[] | select(.fields["是否展示"] == true) | {
            id: .record_id,
            name: .fields["岗位名称"],
            description: .fields["岗位介绍"],
            city: (.fields["期望城市"] | if type == "array" then .[0] else . end),
            recruitType: (.fields["招聘类型"] | if type == "array" then .[0] else . end),
            companyIntro: .fields["公司简介"],
            jobType: (.fields["岗位类型"] | if type == "array" then .[0] else . end)
          }]' > jobs.json

          echo "同步完成，共 $(jq length jobs.json) 个岗位"

      - name: 提交变更（如有）
        run: |
          git config user.name "Sync Bot"
          git config user.email "bot@example.com"
          git add jobs.json
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "auto: 同步岗位数据 $(date +'%Y-%m-%d %H:%M')"
            git push
          else
            echo "无数据变更，跳过提交"
          fi